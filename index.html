<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Edition V2 - Ultra Pro Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: rgba(15, 23, 42, 0.95); --gold: #facc15; --white: #fff;
            --strike: #22c55e; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --yellow: #f59e0b;
        }

        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'Roboto', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; padding-bottom: 25px;
            overflow: hidden;
        }

        /* --- PLAYER PROFILE CARD --- */
        .player-card {
            position: absolute; bottom: 125px; left: -400px; width: 280px; height: 100px;
            background: var(--bg); border-radius: 8px; border-left: 5px solid var(--gold);
            display: flex; align-items: center; padding: 10px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000; color: white;
        }
        .player-card.show { left: 30px; }
        .p-img { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; background: #333; margin-right: 12px; border: 2px solid var(--gold); }
        .p-details h2 { margin: 0; font-family: 'Oswald', sans-serif; font-size: 18px; text-transform: uppercase; color: var(--gold); }
        .p-details p { margin: 0; font-size: 12px; font-weight: bold; }

        /* BIG ALERTS */
        #big-alert {
            position: absolute; top: 35%; transform: scale(0);
            font-family: 'Oswald', sans-serif; font-size: 85px; font-weight: 900;
            color: #fff; background: rgba(0,0,0,0.9); padding: 10px 70px;
            border-radius: 15px; border-bottom: 8px solid var(--gold);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .show-alert { transform: scale(1) !important; }

        /* Tournament Header */
        .tour-header {
            background: var(--gold); color: #000; font-size: 10px;
            width: 620px; text-align: center; padding: 2px 0;
            border-radius: 8px 8px 0 0; text-transform: uppercase; font-weight: 900;
            letter-spacing: 1.5px; position: relative;
        }

        /* Powerplay Badge */
        #pp-badge {
            position: absolute; right: 10px; top: 2px;
            background: var(--red); color: white; padding: 0 5px;
            border-radius: 3px; font-size: 8px; display: none;
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        /* MAIN WIDGET BOX */
        .widget-box {
            display: flex; width: 620px; height: 50px;
            background: var(--bg); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
        }

        .team-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 70px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1);
        }
        .t-logo { width: 28px; height: 28px; object-fit: contain; border-radius: 50%; background: #fff; border: 2px solid var(--gold); }
        .t-name { font-size: 9px; font-weight: 900; color: #fff; margin-top: 2px; }

        .bat-col { display: flex; flex-direction: column; width: 170px; border-right: 1px solid rgba(255,255,255,0.1); }
        .bat-row {
            flex: 1; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #cbd5e1;
            position: relative; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bat-row.active { background: rgba(34, 197, 111, 0.15); color: #fff; }
        .bat-row.active::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--strike); box-shadow: 0 0 10px var(--strike); }
        .b-name { font-weight: 700; flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .b-runs { font-weight: 900; font-size: 14px; color: var(--gold); }
        .b-sr { font-size: 8px; color: #94a3b8; margin-left: 5px; }

        /* Score Center */
        .score-center {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 140px; background: #fff; color: #000; line-height: 0.8; border-right: 1px solid #ddd;
        }
        .r-main { font-size: 26px; font-weight: 900; font-family: 'Oswald', sans-serif; }
        .o-main { font-size: 10px; font-weight: bold; color: #334155; margin-top: 2px; }
        .crr-txt { font-size: 7px; color: #64748b; font-weight: 900; text-transform: uppercase; margin-top: 1px; }
        .p-ship { font-size: 8px; font-weight: bold; color: #64748b; margin-top: 2px; }

        .bw-col { display: flex; flex-direction: column; justify-content: center; padding: 0 10px; width: 170px; }
        .bw-name { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .bw-stats { font-size: 11px; font-weight: 900; color: #fff; margin-top: -1px; }
        
        .tracker { display: flex; gap: 4px; margin-top: 5px; }
        .ball { width: 15px; height: 15px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .ticker-bar {
            width: 620px; background: rgba(0,0,0,0.9); color: #fff; font-size: 11px;
            padding: 3px 0; border-radius: 0 0 10px 10px; text-align: center; font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- Profile Pop-up -->
    <div id="p-card" class="player-card">
        <img id="p-card-img" class="p-img" src="">
        <div class="p-details">
            <h2 id="p-card-name">PLAYER NAME</h2>
            <p id="p-card-runs">0 RUNS (0 BALLS)</p>
            <p id="p-card-sr" style="color:var(--gold)">SR: 0.0</p>
        </div>
    </div>

    <div id="big-alert">SIX!</div>

    <div class="tour-header" id="tour-txt">
        LIVE BROADCAST
        <div id="pp-badge">POWERPLAY</div>
    </div>

    <div class="widget-box">
        <div class="team-side">
            <img id="logo-l" class="t-logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <span class="t-name" id="name-l">TEAM A</span>
        </div>

        <div class="bat-col">
            <div class="bat-row" id="p1-box">
                <span class="b-name" id="p1-n">PLAYER 1</span>
                <span class="b-runs" id="p1-r">0(0)</span>
                <span class="b-sr" id="p1-s">SR: 0.0</span>
            </div>
            <div class="bat-row" id="p2-box">
                <span class="b-name" id="p2-n">PLAYER 2</span>
                <span class="b-runs" id="p2-r">0(0)</span>
                <span class="b-sr" id="p2-s">SR: 0.0</span>
            </div>
        </div>

        <div class="score-center">
            <div class="r-main" id="m-runs">0/0</div>
            <div class="o-main" id="m-ovrs">0.0 OVERS</div>
            <div class="crr-txt">CRR: <span id="m-crr">0.00</span></div>
            <div class="p-ship" id="m-part">PARTNERSHIP: 0</div>
        </div>

        <div class="bw-col">
            <div class="bw-name" id="bw-n">BOWLER NAME</div>
            <div class="bw-stats"><span id="bw-f">0-0</span> | <span id="bw-e">E: 0.0</span></div>
            <div class="tracker" id="ball-tracker">
                <div class="ball"></div><div class="ball"></div><div class="ball"></div>
                <div class="ball"></div><div class="ball"></div><div class="ball"></div>
            </div>
        </div>

        <div class="team-side" style="border-left:1px solid rgba(255,255,255,0.1); border-right:none">
            <img id="logo-r" class="t-logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <span class="t-name" id="name-r">TEAM B</span>
        </div>
    </div>

    <div class="ticker-bar" id="ticker-box">MATCH STARTING SOON...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSATMd4KpT98ZkvYfT00KzIW3cwNzdNbY",
        authDomain: "vipppppp-9b631.firebaseapp.com",
        databaseURL: "https://vipppppp-9b631-default-rtdb.firebaseio.com",
        projectId: "vipppppp-9b631",
        storageBucket: "vipppppp-9b631.firebasestorage.app",
        messagingSenderId: "764700437145",
        appId: "1:764700437145:web:9be9d9aa45829098412608"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('matchData');

    let lastAnim = 0;

    db.on('value', snap => {
        const d = snap.val() || {};
        
        // 1. Ticker Rotation
        const situation = d.ticker || 'LIVE ACTION FROM THE GROUND';
        const fows = (d.fow && d.fow.length > 0) ? "FALL OF WICKETS: " + d.fow.join(' | ') : situation;
        document.getElementById('ticker-box').innerText = (Math.floor(Date.now() / 10000) % 2 === 0) ? situation : fows;

        // 2. Score
        document.getElementById('m-runs').innerText = (d.runs||0) + "/" + (d.wkt||0);
        document.getElementById('m-ovrs').innerText = (d.ovr||0) + "." + (d.ball||0) + " OVERS";
        
        let totalBallsPlayed = ((d.ovr || 0) * 6) + (d.ball || 0);
        document.getElementById('m-crr').innerText = totalBallsPlayed > 0 ? ((d.runs / totalBallsPlayed) * 6).toFixed(2) : "0.00";

        let autoPart = (d.b1r||0) + (d.b2r||0);
        document.getElementById('m-part').innerText = d.isAP ? `PARTNERSHIP: ${autoPart}` : (d.part ? `PARTNERSHIP: ${d.part}` : "PARTNERSHIP: 0");

        // 3. Powerplay
        document.getElementById('pp-badge').style.display = d.isPP ? "block" : "none";
        if(d.tour) document.getElementById('tour-txt').childNodes[0].textContent = d.tour;

        // 4. Teams & LOGOS (Fixed Image loading)
        document.getElementById('name-l').innerText = (d.tAn || 'T1').toUpperCase();
        document.getElementById('name-r').innerText = (d.tBn || 'T2').toUpperCase();
        if(d.tAl) document.getElementById('logo-l').src = d.tAl;
        if(d.tBl) document.getElementById('logo-r').src = d.tBl;

        // 5. Batsmen
        const upBat = (id, n, r, b, strike) => {
            let sr = b > 0 ? ((r/b)*100).toFixed(1) : "0.0";
            document.getElementById(id+'-n').innerText = (n || 'PLAYER').substring(0,12);
            document.getElementById(id+'-r').innerText = r + "(" + b + ")";
            document.getElementById(id+'-s').innerText = "SR: " + sr;
            document.getElementById(id+'-box').className = strike ? 'bat-row active' : 'bat-row';
        };
        upBat('p1', d.b1n, d.b1r||0, d.b1b||0, d.onStrike === 1);
        upBat('p2', d.b2n, d.b2r||0, d.b2b||0, d.onStrike === 2);

        // 6. Bowler
        document.getElementById('bw-n').innerText = (d.bwn || 'BOWLER').substring(0,15);
        document.getElementById('bw-f').innerText = (d.bwr||0) + "-" + (d.bwk || 0);
        let bwb = d.bwb || 0;
        let bwr = d.bwr || 0;
        let eco = bwb > 0 ? ((bwr * 6) / bwb).toFixed(1) : "0.0";
        document.getElementById('bw-e').innerText = "E: " + eco;

        // 7. Profile Pop-up (Fixed Image loading)
        const pCard = document.getElementById('p-card');
        if(d.showP1 || d.showP2) {
            let p_n = d.showP1 ? d.b1n : d.b2n;
            let p_r = d.showP1 ? d.b1r : d.b2r;
            let p_b = d.showP1 ? d.b1b : d.b2b;
            let p_pic = d.showP1 ? d.p1Pic : d.p2Pic;
            
            document.getElementById('p-card-name').innerText = p_n || "PLAYER";
            if(p_pic) document.getElementById('p-card-img').src = p_pic;
            document.getElementById('p-card-runs').innerText = `${p_r||0} RUNS (${p_b||0} BALLS)`;
            document.getElementById('p-card-sr').innerText = "SR: " + (p_b > 0 ? ((p_r/p_b)*100).toFixed(1) : "0.0");
            pCard.classList.add('show');
        } else { 
            pCard.classList.remove('show'); 
        }

        // 8. Tracker
        const slots = document.getElementById('ball-tracker').children;
        for(let i=0; i<6; i++) { slots[i].innerText = ''; slots[i].style.background = '#334155'; }
        if(d.thisOver) {
            d.thisOver.slice(0, 6).forEach((val, i) => {
                if(slots[i]) {
                    slots[i].innerText = val;
                    if(val == "0") slots[i].style.background = "var(--green)";
                    else if(val == "6") slots[i].style.background = "var(--blue)";
                    else if(val == "W") slots[i].style.background = "var(--red)";
                    else if(val == "4") slots[i].style.background = "var(--yellow)";
                    else if(val == "WD" || val == "NB") slots[i].style.background = "#57534e";
                }
            });
        }

        // 9. Alerts
        if (d.animTime && d.animTime !== lastAnim) {
            const ab = document.getElementById('big-alert');
            let t = d.animTrigger;
            ab.innerText = t === 'W' ? 'OUT!' : (t === '6' ? 'SIX!' : 'FOUR!');
            ab.style.color = t === 'W' ? 'var(--red)' : (t === '6' ? 'var(--blue)' : 'var(--gold)');
            ab.classList.add('show-alert');
            setTimeout(() => ab.classList.remove('show-alert'), 3000);
            lastAnim = d.animTime;
        }
    });
</script>
</body>
</html>
