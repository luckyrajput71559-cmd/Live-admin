<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Edition V2 - Pro Layout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: rgba(15, 23, 42, 0.95); --gold: #facc15; --white: #fff;
            --strike: #22c55e; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --yellow: #f59e0b;
        }

        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'Roboto', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; padding-bottom: 25px;
            overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* --- PLAYER PROFILE CARDS (Slightly Smaller) --- */
        .player-card {
            position: absolute; width: 250px; height: 85px;
            background: var(--bg); border-radius: 8px;
            display: flex; align-items: center; padding: 8px; 
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 2000; color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* P1 - LEFT (Off hone par bahar jayega) */
        #p-card-1 { bottom: 110px; left: -320px; border-left: 5px solid var(--gold); }
        #p-card-1.show { left: 15px; }

        /* P2 - RIGHT (Off hone par bahar jayega) */
        #p-card-2 { bottom: 110px; right: -320px; border-right: 5px solid var(--gold); flex-direction: row-reverse; text-align: right; }
        #p-card-2.show { right: 15px; }
        #p-card-2 .p-img { margin-right: 0; margin-left: 10px; }

        /* BOWLER - TOP CENTER */
        #p-card-bw { top: -120px; left: 50%; transform: translateX(-50%); border-bottom: 5px solid var(--gold); width: 280px; height: 80px; }
        #p-card-bw.show { top: 15px; }

        .p-img { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; background: #333; margin-right: 10px; border: 2px solid var(--gold); }
        .p-details h2 { margin: 0; font-family: 'Oswald', sans-serif; font-size: 18px; text-transform: uppercase; color: var(--gold); letter-spacing: 0.5px; }
        .p-details p { margin: 0; font-size: 12px; font-weight: 900; color: #fff; }

        /* BIG ALERTS */
        #big-alert {
            position: absolute; top: 40%; transform: scale(0);
            font-family: 'Oswald', sans-serif; font-size: 85px; font-weight: 900;
            color: #fff; background: rgba(0,0,0,0.9); padding: 10px 70px;
            border-radius: 15px; border-bottom: 8px solid var(--gold);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
            text-transform: uppercase; letter-spacing: 5px;
        }
        .show-alert { transform: scale(1) !important; }

        /* Main Widget Box */
        .tour-header {
            background: var(--gold); color: #000; font-size: 11px;
            width: 620px; text-align: center; padding: 3px 0;
            border-radius: 8px 8px 0 0; text-transform: uppercase; font-weight: 900;
            letter-spacing: 2px; position: relative; font-family: 'Oswald', sans-serif;
        }

        #pp-badge {
            position: absolute; right: 10px; top: 3px;
            background: var(--red); color: white; padding: 0 6px;
            border-radius: 3px; font-size: 9px; display: none;
            animation: blinker 1s linear infinite; font-weight: 900;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        .widget-box {
            display: flex; width: 620px; height: 50px;
            background: var(--bg); border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
        }

        .team-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 70px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1);
        }
        .t-logo { width: 30px; height: 30px; object-fit: contain; border-radius: 50%; background: #fff; border: 2px solid var(--gold); }
        .t-name { font-size: 10px; font-weight: 900; color: #fff; margin-top: 2px; font-family: 'Oswald', sans-serif; }

        .bat-col { display: flex; flex-direction: column; width: 170px; border-right: 1px solid rgba(255,255,255,0.1); }
        .bat-row {
            flex: 1; display: flex; align-items: center; padding: 0 10px; font-size: 12px; color: #e2e8f0;
            position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700;
        }
        .bat-row.active { background: rgba(34, 197, 111, 0.2); color: #fff; }
        .bat-row.active::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--strike); box-shadow: 2px 0 10px var(--strike); }
        .b-name { flex-grow: 1; overflow: hidden; white-space: nowrap; text-transform: uppercase; font-size: 11px; }
        .b-runs { font-weight: 900; font-size: 15px; color: var(--gold); font-family: 'Oswald', sans-serif; }

        .score-center {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 140px; background: #fff; color: #000; line-height: 0.85; border-right: 1px solid #ddd;
        }
        .r-main { font-size: 28px; font-weight: 900; font-family: 'Oswald', sans-serif; letter-spacing: -1px; }
        .o-main { font-size: 11px; font-weight: 900; color: #1e293b; margin-top: 2px; }
        .crr-txt { font-size: 8px; color: #64748b; font-weight: 900; text-transform: uppercase; margin-top: 2px; }

        .bw-col { display: flex; flex-direction: column; justify-content: center; padding: 0 10px; width: 170px; }
        .bw-name { font-size: 11px; font-weight: 900; color: var(--gold); text-transform: uppercase; font-family: 'Oswald', sans-serif; }
        .bw-stats { font-size: 12px; font-weight: 900; color: #fff; margin-top: -1px; font-family: 'Oswald', sans-serif; }
        
        .tracker { display: flex; gap: 4px; margin-top: 4px; }
        .ball { width: 16px; height: 16px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: #fff; }

        .ticker-bar {
            width: 620px; background: rgba(0,0,0,0.92); color: #fff; font-size: 12px;
            padding: 4px 0; border-radius: 0 0 10px 10px; text-align: center; font-weight: 900;
            border-top: 1px solid rgba(255,255,255,0.1); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Profile Pop-ups -->
    <div id="p-card-1" class="player-card"><img id="p-img-1" class="p-img" src=""><div class="p-details"><h2 id="p-name-1">PLAYER 1</h2><p id="p-runs-1">0 RUNS</p><p id="p-sr-1" style="color:var(--gold)">SR: 0.0</p></div></div>
    <div id="p-card-2" class="player-card"><img id="p-img-2" class="p-img" src=""><div class="p-details"><h2 id="p-name-2">PLAYER 2</h2><p id="p-runs-2">0 RUNS</p><p id="p-sr-2" style="color:var(--gold)">SR: 0.0</p></div></div>
    <div id="p-card-bw" class="player-card"><img id="p-img-bw" class="p-img" src=""><div class="p-details"><h2 id="p-name-bw">BOWLER</h2><p id="p-stat-bw">0-0 (0.0)</p><p id="p-eco-bw" style="color:var(--gold)">ECO: 0.0</p></div></div>

    <div id="big-alert">SIX!</div>

    <div class="tour-header" id="tour-txt">LIVE BROADCAST <div id="pp-badge">POWERPLAY</div></div>

    <div class="widget-box">
        <div class="team-side"><img id="logo-l" class="t-logo" src=""><span class="t-name" id="name-l">TEAM A</span></div>
        <div class="bat-col">
            <div class="bat-row" id="p1-box"><span class="b-name" id="p1-n">P1</span><span class="b-runs" id="p1-r">0(0)</span></div>
            <div class="bat-row" id="p2-box"><span class="b-name" id="p2-n">P2</span><span class="b-runs" id="p2-r">0(0)</span></div>
        </div>
        <div class="score-center">
            <div class="r-main" id="m-runs">0/0</div>
            <div class="o-main" id="m-ovrs">0.0 OVERS</div>
            <div class="crr-txt">CRR: <span id="m-crr">0.00</span></div>
        </div>
        <div class="bw-col">
            <div class="bw-name" id="bw-n">BOWLER NAME</div>
            <div class="bw-stats"><span id="bw-f">0-0</span> | <span id="bw-e">E: 0.0</span></div>
            <div class="tracker" id="ball-tracker"><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div></div>
        </div>
        <div class="team-side" style="border-left:1px solid rgba(255,255,255,0.1); border-right:none"><img id="logo-r" class="t-logo" src=""><span class="t-name" id="name-r">TEAM B</span></div>
    </div>

    <div class="ticker-bar" id="ticker-box">MATCH STARTING SOON...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSATMd4KpT98ZkvYfT00KzIW3cwNzdNbY",
        authDomain: "vipppppp-9b631.firebaseapp.com",
        databaseURL: "https://vipppppp-9b631-default-rtdb.firebaseio.com",
        projectId: "vipppppp-9b631",
        storageBucket: "vipppppp-9b631.firebasestorage.app",
        messagingSenderId: "764700437145",
        appId: "1:764700437145:web:9be9d9aa45829098412608"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('matchData');

    let lastAnim = 0;
    db.on('value', snap => {
        const d = snap.val() || {};
        
        document.getElementById('m-runs').innerText = (d.runs||0) + "/" + (d.wkt||0);
        document.getElementById('m-ovrs').innerText = (d.ovr||0) + "." + (d.ball||0) + " OVERS";
        let tb = ((d.ovr||0)*6) + (d.ball||0);
        document.getElementById('m-crr').innerText = tb > 0 ? ((d.runs/tb)*6).toFixed(2) : "0.00";
        document.getElementById('pp-badge').style.display = d.isPP ? "block" : "none";
        document.getElementById('ticker-box').innerText = d.ticker || 'LIVE MATCH';
        document.getElementById('name-l').innerText = (d.tAn || 'T1').toUpperCase();
        document.getElementById('name-r').innerText = (d.tBn || 'T2').toUpperCase();
        if(d.tAl) document.getElementById('logo-l').src = d.tAl;
        if(d.tBl) document.getElementById('logo-r').src = d.tBl;

        document.getElementById('p1-n').innerText = (d.b1n || 'P1').substring(0,10);
        document.getElementById('p1-r').innerText = (d.b1r||0) + "(" + (d.b1b||0) + ")";
        document.getElementById('p2-n').innerText = (d.b2n || 'P2').substring(0,10);
        document.getElementById('p2-r').innerText = (d.b2r||0) + "(" + (d.b2b||0) + ")";
        document.getElementById('p1-box').className = d.onStrike === 1 ? 'bat-row active' : 'bat-row';
        document.getElementById('p2-box').className = d.onStrike === 2 ? 'bat-row active' : 'bat-row';

        document.getElementById('bw-n').innerText = (d.bwn || 'BOWLER').substring(0,15);
        document.getElementById('bw-f').innerText = (d.bwr||0) + "-" + (d.bwk || 0);
        let bwb = d.bwb || 0; let bwr = d.bwr || 0;
        let eco = bwb > 0 ? ((bwr * 6) / bwb).toFixed(1) : "0.0";
        document.getElementById('bw-e').innerText = "E: " + eco;

        if(d.showP1){
            document.getElementById('p-name-1').innerText = d.b1n;
            document.getElementById('p-img-1').src = d.p1Pic || '';
            document.getElementById('p-runs-1').innerText = `${d.b1r||0} RUNS (${d.b1b||0} BALLS)`;
            document.getElementById('p-sr-1').innerText = "SR: " + (d.b1b > 0 ? ((d.b1r/d.b1b)*100).toFixed(1) : "0.0");
            document.getElementById('p-card-1').classList.add('show');
        } else { document.getElementById('p-card-1').classList.remove('show'); }

        if(d.showP2){
            document.getElementById('p-name-2').innerText = d.b2n;
            document.getElementById('p-img-2').src = d.p2Pic || '';
            document.getElementById('p-runs-2').innerText = `${d.b2r||0} RUNS (${d.b2b||0} BALLS)`;
            document.getElementById('p-sr-2').innerText = "SR: " + (d.b2b > 0 ? ((d.b2r/d.b2b)*100).toFixed(1) : "0.0");
            document.getElementById('p-card-2').classList.add('show');
        } else { document.getElementById('p-card-2').classList.remove('show'); }

        if(d.showPBw){
            document.getElementById('p-name-bw').innerText = d.bwn;
            document.getElementById('p-img-bw').src = d.bwPic || '';
            document.getElementById('p-stat-bw').innerText = `${d.bwr||0}-${d.bwk||0} (${Math.floor(bwb/6)}.${bwb%6} OV)`;
            document.getElementById('p-eco-bw').innerText = "ECO: " + eco;
            document.getElementById('p-card-bw').classList.add('show');
        } else { document.getElementById('p-card-bw').classList.remove('show'); }

        const slots = document.getElementById('ball-tracker').children;
        for(let i=0; i<6; i++){ slots[i].innerText = ''; slots[i].style.background = '#334155'; }
        if(d.thisOver) { d.thisOver.slice(0, 6).forEach((val, i) => { if(slots[i]){ slots[i].innerText = val; if(val == "W") slots[i].style.background = "var(--red)"; else if(val == "4" || val == "6") slots[i].style.background = "var(--blue)"; } }); }

        if (d.animTime && d.animTime !== lastAnim) {
            const ab = document.getElementById('big-alert');
            ab.innerText = d.animTrigger === 'W' ? 'OUT!' : (d.animTrigger === '6' ? 'SIX!' : 'FOUR!');
            ab.style.color = d.animTrigger === 'W' ? 'var(--red)' : (d.animTrigger === '6' ? 'var(--blue)' : 'var(--gold)');
            ab.classList.add('show-alert'); setTimeout(() => ab.classList.remove('show-alert'), 3000);
            lastAnim = d.animTime;
        }
    });
</script>
</body>
</html>
