<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Pro Console - Fast Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; letter-spacing: 1px; }
        html, body { height: 100%; margin: 0; background: #070b14; color: white; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; padding: 12px; gap: 10px; }
        .card-pro { background: #111827; border-radius: 15px; padding: 12px; border: 1.5px solid rgba(255,255,255,0.08); transition: 0.3s; margin-bottom: 5px; }
        .active-strike { border: 2.5px solid #22c55e !important; background: rgba(34, 197, 111, 0.1) !important; box-shadow: 0 0 15px rgba(34, 197, 111, 0.2); }
        .score-display { text-align: center; }
        .score-display h1 { font-size: 45px; margin: 0; color: #facc15; font-weight: 900; }
        .tracker-patti { background: #1f2937; border-radius: 8px; padding: 5px; margin-top: 8px; display: flex; gap: 6px; justify-content: center; min-height: 35px; align-items: center; border: 1px solid #374151; }
        .ball-tag { font-size: 12px; font-weight: 900; background: #374151; padding: 2px 8px; border-radius: 4px; color: #38bdf8; border: 1px solid #4b5563; }
        .control-area { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; }
        .run-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-run { height: 52px; border-radius: 10px; border: none; font-weight: 900; font-size: 20px; color: white; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        .btn-run:active { transform: translateY(3px); box-shadow: none; }
        .b-grey { background: #374151; } .b-yellow { background: #eab308; color: #000; } .b-blue { background: #2563eb; } .b-red { background: #dc2626; }
        .tgl-box { background: #1f2937; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; border: 1px solid transparent; margin-bottom: 5px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .tgl-on { border-color: #22c55e; background: rgba(34, 197, 111, 0.2); color: #4ade80; }
        .form-input { background: #1f2937; border: 1px solid #374151; color: white; font-size: 13px; padding: 7px; border-radius: 6px; width: 100%; margin-top: 4px; }
        .label-cap { font-size: 10px; color: #94a3b8; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="card-pro score-display"><h1 id="disp-score">0/0</h1><div id="disp-ovr">OV: 0.0</div><div class="tracker-patti" id="tracker"></div></div>
    
    <div class="control-area">
        <div class="run-grid">
            <button class="btn-run b-grey" onclick="actionRun(0)">0</button><button class="btn-run b-grey" onclick="actionRun(1)">1</button>
            <button class="btn-run b-grey" onclick="actionRun(2)">2</button><button class="btn-run b-grey" onclick="actionRun(3)">3</button>
            <button class="btn-run b-yellow" onclick="actionRun(4)">4</button><button class="btn-run b-blue" onclick="actionRun(6)">6</button>
            <button class="btn-run b-grey" style="background:#4b5563" onclick="actionExtra('WD')">WD</button><button class="btn-run b-grey" style="background:#4b5563" onclick="actionExtra('NB')">NB</button>
            <button class="btn-run b-red" onclick="actionWkt()">WKT</button><button class="btn-run b-grey" onclick="undo()">UNDO</button>
        </div>
        <div class="side-controls">
            <div id="tgl-p1" class="tgl-box" onclick="toggleCard('P1')">P1 PROFILE</div>
            <div id="tgl-p2" class="tgl-box" onclick="toggleCard('P2')">P2 PROFILE</div>
            <div id="tgl-bw" class="tgl-box" onclick="toggleCard('PBw')">BOWLER PROFILE</div>
            <div id="tgl-tg" class="tgl-box" onclick="toggleCard('Target')">SHOW TARGET</div>
            <div id="tgl-pp" class="tgl-box" onclick="toggleCard('PP')">POWERPLAY</div>
            <button class="btn btn-warning btn-sm w-100 py-2 mt-1" onclick="swapStrike()" style="font-weight:900">SWAP 🔃</button>
        </div>
    </div>

    <!-- Players -->
    <div class="row g-2">
        <div class="col-6"><div id="box-p1" class="card-pro"><span class="label-cap">Player 1 Name</span><input type="text" id="b1n" class="form-input" oninput="sync('b1n')"><span class="label-cap">Pic URL 1</span><input type="text" id="p1Pic" class="form-input" oninput="sync('p1Pic')"></div></div>
        <div class="col-6"><div id="box-p2" class="card-pro"><span class="label-cap">Player 2 Name</span><input type="text" id="b2n" class="form-input" oninput="sync('b2n')"><span class="label-cap">Pic URL 2</span><input type="text" id="p2Pic" class="form-input" oninput="sync('p2Pic')"></div></div>
    </div>

    <!-- Partnership -->
    <div class="card-pro"><div class="row g-2">
        <div class="col-12 text-center"><span class="label-cap" style="color:var(--gold)">PARTNERSHIP (MANUAL)</span></div>
        <div class="col-6"><span class="label-cap">Runs</span><input type="number" id="pship" class="form-input" oninput="sync('pship')"></div>
        <div class="col-6"><span class="label-cap">Balls</span><input type="number" id="pshipB" class="form-input" oninput="sync('pshipB')"></div>
    </div></div>

    <!-- Settings -->
    <div class="card-pro"><div class="row g-2">
        <div class="col-4"><span class="label-cap">Target</span><input type="number" id="target" class="form-input" oninput="sync('target')"></div>
        <div class="col-4"><span class="label-cap">Max Ov</span><input type="number" id="matchOvers" class="form-input" oninput="sync('matchOvers')"></div>
        <div class="col-4"><span class="label-cap">BW Name</span><input type="text" id="bwn" class="form-input" oninput="sync('bwn')"></div>
        <div class="col-6"><span class="label-cap">Bowler URL Link</span><input type="text" id="bwPic" class="form-input" oninput="sync('bwPic')"></div>
        <div class="col-6"><span class="label-cap">Ticker Message</span><input type="text" id="ticker" class="form-input" oninput="sync('ticker')"></div>
    </div></div>

    <!-- Teams -->
    <div class="card-pro"><div class="row g-2">
        <div class="col-6"><span class="label-cap" style="color:var(--gold)">Team 1 (Name|Logo)</span><input type="text" id="tAn" class="form-input" oninput="sync('tAn')"><input type="text" id="tAl" class="form-input" oninput="sync('tAl')"></div>
        <div class="col-6"><span class="label-cap" style="color:var(--gold)">Team 2 (Name|Logo)</span><input type="text" id="tBn" class="form-input" oninput="sync('tBn')"><input type="text" id="tBl" class="form-input" oninput="sync('tBl')"></div>
        <div class="col-12"><span class="label-cap">Toss Info</span><input type="text" id="toss" class="form-input" oninput="sync('toss')"></div>
    </div></div>

    <div class="card-pro" style="background: rgba(34, 197, 111, 0.05); border-color: #22c55e;">
        <div class="row g-2 text-center align-items-center">
            <div class="col-4"><span class="label-cap">CRR</span><div id="live-crr" style="color:#22c55e; font-weight:bold;">0.00</div></div>
            <div class="col-4"><span class="label-cap" id="label-extra">PROJ SCORE</span><div id="live-extra" style="color:var(--gold); font-weight:bold;">0</div></div>
            <div class="col-4"><div id="tgl-fh" class="tgl-box" onclick="toggleCard('FreeHit')" style="margin-top:2px;">FREE HIT</div></div>
        </div>
    </div>
    <button class="btn-run b-red w-100 mt-1 mb-4" onclick="reset()">RESET MATCH</button>
</div>

<script>
    // Firebase Config (YOURS - unchanged)
    const firebaseConfig = { 
        apiKey: "AIzaSyCSATMd4KpT98ZkvYfT00KzIW3cwNzdNbY", 
        authDomain: "vipppppp-9b631.firebaseapp.com", 
        databaseURL: "https://vipppppp-9b631-default-rtdb.firebaseio.com", 
        projectId: "vipppppp-9b631", 
        storageBucket: "vipppppp-9b631.firebasestorage.app", 
        messagingSenderId: "764700437145", 
        appId: "1:764700437145:web:9be9d9aa45829098412608" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('matchData');
    
    // LOCAL CACHE - THIS IS THE SPEED SECRET
    let localData = {
        runs: 0, wkt: 0, ovr: 0, ball: 0, onStrike: 1,
        b1r: 0, b1b: 0, b2r: 0, b2b: 0,
        bwr: 0, bwb: 0, bwk: 0, bwn: 'Bowler',
        pship: 0, pshipB: 0, target: 0, matchOvers: 20,
        tAn: 'T1', tBn: 'T2', toss: '', ticker: '',
        showTarget: false, isFreeHit: false, isPP: false,
        showP1: false, showP2: false, showPBw: false,
        thisOver: [], animTrigger: '', animTime: 0
    };
    
    let historyStack = [];
    let isUpdating = false;
    
    // FAST WRITE - no extra read
    function fastUpdate(changes) {
        if (isUpdating) return;
        isUpdating = true;
        
        // Apply to local cache first (instant UI feel)
        Object.assign(localData, changes);
        
        // Write to Firebase (async - doesn't block UI)
        dbRef.update(changes).catch(e => console.error("FB Error:", e));
        
        // Update UI immediately from local cache
        renderUI();
        
        setTimeout(() => { isUpdating = false; }, 50);
    }
    
    // Save to history for UNDO
    function saveToHistory() {
        historyStack.push(JSON.stringify(localData));
        if (historyStack.length > 50) historyStack.shift();
    }
    
    // ACTION: Runs
    function actionRun(r) {
        saveToHistory();
        
        let newData = { ...localData };
        
        newData.runs = (newData.runs || 0) + r;
        newData.pship = (newData.pship || 0) + r;
        newData.pshipB = (newData.pshipB || 0) + 1;
        newData.bwr = (newData.bwr || 0) + r;
        newData.bwb = (newData.bwb || 0) + 1;
        newData.ball = (newData.ball || 0) + 1;
        
        let strike = newData.onStrike || 1;
        
        if (strike == 1) {
            newData.b1r = (newData.b1r || 0) + r;
            newData.b1b = (newData.b1b || 0) + 1;
        } else {
            newData.b2r = (newData.b2r || 0) + r;
            newData.b2b = (newData.b2b || 0) + 1;
        }
        
        // Strike rotation on odd runs
        if (r == 1 || r == 3) {
            newData.onStrike = (strike == 1 ? 2 : 1);
        }
        
        // Over completion
        let thisOver = [...(newData.thisOver || [])];
        thisOver.push(r.toString());
        
        if (newData.ball >= 6) {
            newData.ovr = (newData.ovr || 0) + 1;
            newData.ball = 0;
            thisOver = [];
            newData.onStrike = (strike == 1 ? 2 : 1);
        }
        
        newData.thisOver = thisOver;
        
        // Animation trigger
        if (r == 4 || r == 6) {
            newData.animTrigger = r.toString();
            newData.animTime = Date.now();
        }
        
        newData.isFreeHit = false;
        
        fastUpdate(newData);
    }
    
    // ACTION: Extra (WD/NB)
    function actionExtra(t) {
        saveToHistory();
        
        let newData = { ...localData };
        
        newData.runs = (newData.runs || 0) + 1;
        newData.pship = (newData.pship || 0) + 1;
        newData.bwr = (newData.bwr || 0) + 1;
        
        let thisOver = [...(newData.thisOver || [])];
        thisOver.push(t);
        newData.thisOver = thisOver;
        newData.isFreeHit = (t == 'NB');
        
        fastUpdate(newData);
    }
    
    // ACTION: Wicket
    function actionWkt() {
        saveToHistory();
        
        let newData = { ...localData };
        
        newData.wkt = (newData.wkt || 0) + 1;
        newData.bwb = (newData.bwb || 0) + 1;
        newData.bwk = (newData.bwk || 0) + 1;
        newData.ball = (newData.ball || 0) + 1;
        newData.pship = 0;
        newData.pshipB = 0;
        
        let thisOver = [...(newData.thisOver || [])];
        thisOver.push('W');
        
        let strike = newData.onStrike || 1;
        
        if (newData.ball >= 6) {
            newData.ovr = (newData.ovr || 0) + 1;
            newData.ball = 0;
            thisOver = [];
            newData.onStrike = (strike == 1 ? 2 : 1);
        }
        
        newData.thisOver = thisOver;
        newData.animTrigger = 'W';
        newData.animTime = Date.now();
        
        fastUpdate(newData);
        
        // Ask for new batsman name
        let newName = prompt("New Batsman Name?");
        if (newName && newName.trim()) {
            let updateName = {};
            if (newData.onStrike == 1) {
                updateName.b1n = newName;
                updateName.b1r = 0;
                updateName.b1b = 0;
            } else {
                updateName.b2n = newName;
                updateName.b2r = 0;
                updateName.b2b = 0;
            }
            fastUpdate(updateName);
        }
    }
    
    // UNDO function
    function undo() {
        if (historyStack.length > 0) {
            let previous = JSON.parse(historyStack.pop());
            fastUpdate(previous);
        } else {
            alert("Nothing to undo!");
        }
    }
    
    // RESET match
    function reset() {
        if (confirm("Full Match Reset?")) {
            historyStack = [];
            let resetData = {
                runs: 0, wkt: 0, ovr: 0, ball: 0, onStrike: 1,
                b1n: 'P1', b1r: 0, b1b: 0, b2n: 'P2', b2r: 0, b2b: 0,
                bwr: 0, bwb: 0, bwk: 0, bwn: 'Bowler',
                pship: 0, pshipB: 0, target: 0, matchOvers: 20,
                tAn: 'T1', tBn: 'T2', toss: '', ticker: '',
                showTarget: false, isFreeHit: false, isPP: false,
                showP1: false, showP2: false, showPBw: false,
                thisOver: [], animTrigger: '', animTime: 0
            };
            fastUpdate(resetData);
        }
    }
    
    // Toggle cards
    function toggleCard(k) {
        let key = '';
        if (k == 'PP') key = 'isPP';
        else if (k == 'FreeHit') key = 'isFreeHit';
        else if (k == 'Target') key = 'showTarget';
        else if (k == 'P1') key = 'showP1';
        else if (k == 'P2') key = 'showP2';
        else if (k == 'PBw') key = 'showPBw';
        
        let newVal = !localData[key];
        fastUpdate({ [key]: newVal });
    }
    
    // Sync input fields
    function sync(fieldId) {
        let el = document.getElementById(fieldId);
        if (el) {
            fastUpdate({ [fieldId]: el.value });
        }
    }
    
    // Swap strike manually
    function swapStrike() {
        let newStrike = (localData.onStrike == 1 ? 2 : 1);
        fastUpdate({ onStrike: newStrike });
    }
    
    // RENDER UI from local cache (INSTANT - no Firebase wait)
    function renderUI() {
        let d = localData;
        
        // Score display
        document.getElementById('disp-score').innerText = (d.runs || 0) + "/" + (d.wkt || 0);
        document.getElementById('disp-ovr').innerText = "OV: " + (d.ovr || 0) + "." + (d.ball || 0);
        
        // CRR calculation
        let pb = ((d.ovr || 0) * 6) + (d.ball || 0);
        let crr = pb > 0 ? ((d.runs / pb) * 6).toFixed(2) : "0.00";
        document.getElementById('live-crr').innerText = crr;
        
        // Target / Required RR logic
        if (d.showTarget && d.target > 0) {
            document.getElementById('label-extra').innerText = "REQ RR";
            let remB = ((d.matchOvers || 20) * 6) - pb;
            let reqRR = remB > 0 ? (((d.target - d.runs) / remB) * 6).toFixed(2) : "0.00";
            document.getElementById('live-extra').innerText = reqRR;
        } else {
            document.getElementById('label-extra').innerText = "PROJ SCORE";
            let proj = pb > 0 ? ((d.runs / pb) * ((d.matchOvers || 20) * 6)).toFixed(0) : "0";
            document.getElementById('live-extra').innerText = proj;
        }
        
        // Active strike highlight
        document.getElementById('box-p1').className = (d.onStrike == 1) ? "card-pro active-strike" : "card-pro";
        document.getElementById('box-p2').className = (d.onStrike == 2) ? "card-pro active-strike" : "card-pro";
        
        // Toggle button states
        document.getElementById('tgl-p1').className = d.showP1 ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-p2').className = d.showP2 ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-bw').className = d.showPBw ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-tg').className = d.showTarget ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-pp').className = d.isPP ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-fh').className = d.isFreeHit ? "tgl-box tgl-on" : "tgl-box";
        
        // Over tracker balls
        const tracker = document.getElementById('tracker');
        tracker.innerHTML = '';
        if (d.thisOver && Array.isArray(d.thisOver)) {
            d.thisOver.forEach(b => {
                if (b) {
                    let span = document.createElement('span');
                    span.className = 'ball-tag';
                    span.innerText = b;
                    tracker.appendChild(span);
                }
            });
        }
        
        // Input fields (only if not focused)
        let inputIds = ['b1n', 'b2n', 'ticker', 'bwn', 'target', 'matchOvers', 'p1Pic', 'p2Pic', 'bwPic', 'tAl', 'tBl', 'tAn', 'tBn', 'pship', 'pshipB', 'toss'];
        inputIds.forEach(id => {
            let el = document.getElementById(id);
            if (el && document.activeElement !== el) {
                el.value = d[id] !== undefined ? d[id] : '';
            }
        });
    }
    
    // Firebase REAL-TIME listener (only for SYNC across devices - doesn't block UI)
    dbRef.on('value', (snapshot) => {
        let fbData = snapshot.val();
        if (fbData && !isUpdating) {
            // Merge Firebase data into local cache (for multi-admin sync)
            Object.assign(localData, fbData);
            renderUI();
        }
    });
    
    // Initial render
    renderUI();
</script>
</body>
</html>
