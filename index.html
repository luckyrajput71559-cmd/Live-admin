<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Pro Console - Fixed Toggles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; letter-spacing: 1px; }
        html, body { height: 100%; margin: 0; background: #070b14; color: white; overflow-x: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; padding: 12px; gap: 10px; }

        .card-pro { background: #111827; border-radius: 15px; padding: 12px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        /* --- Score & Tracker --- */
        .score-display { text-align: center; }
        .score-display h1 { font-size: 40px; margin: 0; color: #facc15; font-weight: 900; line-height: 1; }
        
        .tracker-patti { background: #1f2937; border-radius: 8px; padding: 5px; margin-top: 8px; display: flex; gap: 6px; justify-content: center; min-height: 28px; align-items: center; }
        .ball-tag { font-size: 11px; font-weight: 900; background: #374151; padding: 1px 6px; border-radius: 4px; color: #38bdf8; }

        /* --- VERTICAL GRID --- */
        .control-area { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; }
        .run-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        .btn-run { height: 50px; border-radius: 10px; border: none; font-weight: 900; font-size: 20px; color: white; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        .btn-run:active { transform: translateY(3px); box-shadow: none; }
        
        .b-grey { background: #374151; }
        .b-yellow { background: #eab308; color: #000; }
        .b-blue { background: #2563eb; }
        .b-red { background: #dc2626; }
        .btn-undo { background: #4b5563; font-size: 13px; grid-column: span 2; height: 40px; }

        /* --- TOGGLES --- */
        .side-controls { display: flex; flex-direction: column; gap: 6px; }
        .tgl-box { background: #1f2937; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; border: 1.5px solid transparent; transition: 0.3s; }
        .tgl-on { border-color: #22c55e; background: rgba(34, 197, 111, 0.2); color: #4ade80; box-shadow: 0 0 10px rgba(34, 197, 111, 0.2); }
        .tgl-box span { font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; }

        /* --- Players --- */
        .player-card { background: #111827; padding: 10px; border-radius: 12px; border: 2px solid transparent; }
        .active-strike { border-color: #22c55e; background: rgba(34, 197, 111, 0.05); }
        
        .form-input { background: #1f2937; border: 1px solid #374151; color: white; font-size: 12px; padding: 6px; border-radius: 6px; width: 100%; margin-top: 4px; }
        .label-cap { font-size: 9px; color: #94a3b8; font-weight: 900; text-transform: uppercase; }
        
        .btn-reset { background: none; border: 1px solid #374151; color: #64748b; font-size: 9px; margin-top: 5px; border-radius: 4px; padding: 4px; width: 100%; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Score & Tracker -->
    <div class="card-pro score-display">
        <h1 id="disp-score">0/0</h1>
        <div class="d-flex justify-content-center gap-3 mt-1">
            <span id="disp-ovr" style="font-size:13px">OV: 0.0</span>
            <span id="disp-crr" style="color:#facc15; font-size:13px">CRR: 0.00</span>
        </div>
        <div class="tracker-patti" id="tracker"></div>
    </div>

    <!-- Vertical Buttons & Toggles -->
    <div class="control-area">
        <div class="run-grid">
            <button class="btn-run b-grey" onclick="actionRun(0)">0</button>
            <button class="btn-run b-grey" onclick="actionRun(1)">1</button>
            <button class="btn-run b-grey" onclick="actionRun(2)">2</button>
            <button class="btn-run b-grey" onclick="actionRun(3)">3</button>
            <button class="btn-run b-yellow" onclick="actionRun(4)">4</button>
            <button class="btn-run b-blue" onclick="actionRun(6)">6</button>
            <button class="btn-run b-red" onclick="actionWkt()">WKT</button>
            <button class="btn-run b-red" style="background:#991b1b" onclick="actionExtra('wd')">WD</button>
            <button class="btn-run btn-undo" onclick="undo()">UNDO ↩️</button>
        </div>

        <div class="side-controls">
            <div id="tgl-pp" class="tgl-box" onclick="togglePP()"><span>Powerplay</span></div>
            <div id="tgl-ap" class="tgl-box" onclick="toggleAP()"><span>Auto Part.</span></div>
            <div id="tgl-p1" class="tgl-box" onclick="toggleCard(1)"><span>P1 Profile</span></div>
            <div id="tgl-p2" class="tgl-box" onclick="toggleCard(2)"><span>P2 Profile</span></div>
            <button class="btn btn-success btn-sm w-100 py-2 mt-1" onclick="swapStrike()" style="font-weight:900; border-radius:8px">SWAP 🔃</button>
            <button class="btn btn-primary btn-sm w-100 py-2" onclick="autoNeed()" style="font-weight:900; border-radius:8px; font-size:10px">AUTO NEED</button>
        </div>
    </div>

    <!-- Batsmen & Photo URLs -->
    <div class="row g-2">
        <div class="col-6">
            <div id="box-b1" class="player-card">
                <span class="label-cap">Batsman 1 Name</span>
                <input type="text" id="b1n" class="form-input" oninput="sync('b1n')">
                <span class="label-cap mt-2 d-block">P1 Photo URL</span>
                <input type="text" id="p1Pic" class="form-input" placeholder="http://..." oninput="sync('p1Pic')">
            </div>
        </div>
        <div class="col-6">
            <div id="box-b2" class="player-card">
                <span class="label-cap">Batsman 2 Name</span>
                <input type="text" id="b2n" class="form-input" oninput="sync('b2n')">
                <span class="label-cap mt-2 d-block">P2 Photo URL</span>
                <input type="text" id="p2Pic" class="form-input" placeholder="http://..." oninput="sync('p2Pic')">
            </div>
        </div>
    </div>

    <!-- Teams & Logos Section -->
    <div class="card-pro">
        <div class="row g-2">
            <div class="col-6">
                <span class="label-cap">Team A (Name | Logo URL)</span>
                <input type="text" id="tAn" class="form-input mb-1" placeholder="Team Name" oninput="sync('tAn')">
                <input type="text" id="tAl" class="form-input" placeholder="Logo URL" oninput="sync('tAl')">
            </div>
            <div class="col-6">
                <span class="label-cap">Team B (Name | Logo URL)</span>
                <input type="text" id="tBn" class="form-input mb-1" placeholder="Team Name" oninput="sync('tBn')">
                <input type="text" id="tBl" class="form-input" placeholder="Logo URL" oninput="sync('tBl')">
            </div>
        </div>
    </div>

    <!-- Bowler & Ticker -->
    <div class="card-pro">
        <div class="row g-2">
            <div class="col-6">
                <span class="label-cap">Current Bowler</span>
                <input type="text" id="bwn" class="form-input" oninput="sync('bwn')">
            </div>
            <div class="col-6">
                <span class="label-cap">Bottom Ticker</span>
                <input type="text" id="ticker" class="form-input" oninput="sync('ticker')">
            </div>
        </div>
    </div>

    <button class="btn-reset" onclick="reset()">RESET ENTIRE MATCH</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSATMd4KpT98ZkvYfT00KzIW3cwNzdNbY",
        authDomain: "vipppppp-9b631.firebaseapp.com",
        databaseURL: "https://vipppppp-9b631-default-rtdb.firebaseio.com",
        projectId: "vipppppp-9b631",
        storageBucket: "vipppppp-9b631.firebasestorage.app",
        messagingSenderId: "764700437145",
        appId: "1:764700437145:web:9be9d9aa45829098412608"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('matchData');

    let history = [];
    function pushHistory(d) { history.push(JSON.parse(JSON.stringify(d))); if(history.length > 20) history.shift(); }

    function actionRun(r) {
        db.once('value').then(snap => {
            let d = snap.val() || {runs:0, wkt:0, ovr:0, ball:0, bwr:0, bwb:0, onStrike:1};
            pushHistory(d);
            d.runs += r; d.bwr = (d.bwr||0)+r; d.bwb = (d.bwb||0)+1;
            if(!d.thisOver) d.thisOver = []; d.thisOver.push(r.toString());
            if(d.onStrike === 1) { d.b1r = (d.b1r||0)+r; d.b1b = (d.b1b||0)+1; }
            else { d.b2r = (d.b2r||0)+r; d.b2b = (d.b2b||0)+1; }
            d.ball++;
            if(d.ball>=6) { d.ovr++; d.ball=0; d.thisOver=[]; d.onStrike = (d.onStrike==1?2:1); }
            else if(r%2!==0) { d.onStrike = (d.onStrike==1?2:1); }
            if(r==4 || r==6) { d.animTrigger=r.toString(); d.animTime=Date.now(); }
            db.set(d);
        });
    }

    function actionExtra(type) {
        db.once('value').then(snap => {
            let d = snap.val(); pushHistory(d);
            d.runs += 1; d.bwr = (d.bwr||0)+1;
            if(!d.thisOver) d.thisOver = []; d.thisOver.push(type.toUpperCase());
            db.set(d);
        });
    }

    function actionWkt() {
        db.once('value').then(snap => {
            let d = snap.val(); pushHistory(d);
            d.wkt++; d.bwk = (d.bwk||0)+1; d.bwb = (d.bwb||0)+1;
            if(!d.thisOver) d.thisOver = []; d.thisOver.push('W');
            d.animTrigger='W'; d.animTime=Date.now();
            d.ball++; if(d.ball>=6) { d.ovr++; d.ball=0; d.thisOver=[]; d.onStrike = (d.onStrike==1?2:1); }
            db.set(d);
            let n = prompt("New Batsman Name?"); if(n) { if(d.onStrike==1) {d.b1n=n; d.b1r=0; d.b1b=0;} else {d.b2n=n; d.b2r=0; d.b2b=0;} db.set(d); }
        });
    }

    function undo() { if(history.length > 0) db.set(history.pop()); else alert("No Undo left"); }
    function swapStrike() { db.once('value').then(snap => { let d = snap.val(); pushHistory(d); d.onStrike = (d.onStrike==1?2:1); db.set(d); }); }
    
    function togglePP() { db.once('value').then(snap => { db.update({isPP: !snap.val().isPP}); }); }
    function toggleAP() { db.once('value').then(snap => { db.update({isAP: !snap.val().isAP}); }); }
    function toggleCard(id) { 
        db.once('value').then(snap => { 
            let key = "showP" + id;
            let val = snap.val()[key] || false;
            db.update({ [key]: !val }); 
        }); 
    }

    function autoNeed() {
        db.once('value').then(snap => {
            let d = snap.val();
            let need = (d.target || 0) - (d.runs || 0);
            let remBalls = 120 - ((d.ovr || 0) * 6 + d.ball);
            db.update({ ticker: `NEED ${need} RUNS IN ${remBalls} BALLS` });
        });
    }

    function sync(id) { db.update({ [id]: document.getElementById(id).value }); }

    db.on('value', snap => {
        let d = snap.val() || {};
        document.getElementById('disp-score').innerText = (d.runs||0) + "/" + (d.wkt||0);
        document.getElementById('disp-ovr').innerText = "OV: " + (d.ovr||0) + "." + (d.ball||0);
        let tb = ((d.ovr||0)*6) + (d.ball||0);
        document.getElementById('disp-crr').innerText = "CRR: " + (tb > 0 ? ((d.runs/tb)*6).toFixed(2) : "0.00");
        
        document.getElementById('box-b1').className = d.onStrike === 1 ? "player-card active-strike" : "player-card";
        document.getElementById('box-b2').className = d.onStrike === 2 ? "player-card active-strike" : "player-card";

        document.getElementById('tgl-pp').className = d.isPP ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-ap').className = d.isAP ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-p1').className = d.showP1 ? "tgl-box tgl-on" : "tgl-box";
        document.getElementById('tgl-p2').className = d.showP2 ? "tgl-box tgl-on" : "tgl-box";

        const log = document.getElementById('tracker'); log.innerHTML = '';
        if(d.thisOver) d.thisOver.forEach(b => { let s = document.createElement('span'); s.className='ball-tag'; s.innerText=b; log.appendChild(s); });

        ['b1n', 'b2n', 'ticker', 'bwn', 'p1Pic', 'p2Pic', 'tAn', 'tAl', 'tBn', 'tBl'].forEach(id => { 
            if(document.activeElement.id !== id) document.getElementById(id).value = d[id] || ''; 
        });
    });

    function reset() { if(confirm("Reset Everything?")) db.set({runs:0, wkt:0, ovr:0, ball:0, bwr:0, bwb:0, bwk:0, onStrike:1, thisOver:[], isPP:false, isAP:false, showP1:false, showP2:false, b1r:0, b1b:0, b2r:0, b2b:0, fow:[], tAn:'TEAM A', tBn:'TEAM B', tAl:'', tBl:'', p1Pic:'', p2Pic:''}); }
</script>
</body>
</html>
